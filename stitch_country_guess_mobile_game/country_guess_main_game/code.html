<script>
        // Micro-interactions for game tiles
        document.querySelectorAll('.game-tile-shadow').forEach(tile => {
            tile.addEventListener('click', () => {
                tile.classList.add('scale-110', 'rotate-2');
                setTimeout(() => {
                    tile.classList.remove('scale-110', 'rotate-2');
                }, 200);
            });
        });

        // Simple haptic-like animation for buttons
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.98)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
