<canvas class="confetti-canvas" id="confetti"></canvas>
<script>
        // Simple micro-interaction: Confetti celebration on load
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.size = Math.random() * 8 + 4;
                this.color = ['#6C5CE7', '#5847D2', '#00B894', '#FF6B6B', '#FFD93D'][Math.floor(Math.random() * 5)];
                this.speed = Math.random() * 3 + 2;
                this.angle = Math.random() * Math.PI * 2;
                this.rotation = Math.random() * 0.2 - 0.1;
            }
            update() {
                this.y += this.speed;
                this.angle += this.rotation;
                this.x += Math.sin(this.angle) * 1;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    particles.push(new Particle());
                }, i * 20);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.y > canvas.height) particles.splice(index, 1);
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        init();
        animate();

        // Loop confetti every 10 seconds for fun
        setInterval(init, 10000);
    </script>
