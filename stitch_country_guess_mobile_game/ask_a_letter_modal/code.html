<!-- Modal Header & Description -->

<h2 class="font-headline-md text-headline-md-mobile text-on-surface mb-2">Ask a Letter</h2>
<p class="font-body-md text-body-md text-on-surface-variant px-4">
                    Choose a letter to reveal. Each letter costs <span class="text-primary font-bold">50 points</span>.
                </p>

<!-- Letter Grid -->
<div class="grid grid-cols-6 sm:grid-cols-7 gap-2 md:gap-3 px-1">
<script>
                    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
                    const usedLetters = ["A", "E", "I", "S", "T", "R"];
                    
                    document.write(letters.map(letter => {
                        const isDisabled = usedLetters.includes(letter);
                        const disabledClasses = isDisabled ? "bg-surface-container-highest text-outline cursor-not-allowed opacity-50" : "bg-surface-container-lowest text-on-surface shadow-sm cursor-pointer";
                        const strike = isDisabled ? "line-through decoration-2" : "";
                        
                        return `
                            <button 
                                onclick="${!isDisabled ? 'selectLetter(this)' : ''}"
                                class="letter-tile w-full aspect-square rounded-xl flex items-center justify-center font-headline-md text-headline-md-mobile ${disabledClasses} ${strike} ${!isDisabled ? 'hover:bg-surface-container-low active:scale-95' : ''}"
                                ${isDisabled ? 'disabled' : ''}
                            >
                                ${letter}
                            </button>
                        `;
                    }).join(''));

                    function selectLetter(el) {
                        // Remove previous selection
                        document.querySelectorAll('.letter-tile').forEach(t => t.classList.remove('selected'));
                        // Add selection to clicked element
                        el.classList.add('selected');
                        // Enable button
                        document.getElementById('confirm-btn').disabled = false;
                        document.getElementById('confirm-btn').classList.remove('opacity-50');
                    }
                </script>
</div>
<!-- Points Display / Counter -->
<div class="bg-surface-container-low rounded-xl py-3 px-gutter flex justify-between items-center">
<div class="flex items-center gap-2">
